services:
  dashboard:
    build: .
    container_name: nas-dashboard
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      - PORT=3000
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: nas-cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    restart: unless-stopped
    profiles:
      - tunnel
