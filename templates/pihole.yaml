services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    environment:
      - TZ=${TZ:-America/New_York}
      - WEBPASSWORD=${WEBPASSWORD:-changeme}
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
    restart: unless-stopped
