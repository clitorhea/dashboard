services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
      - VERSION=docker
    volumes:
      - ./config:/config
      - /media/tv:/tv
      - /media/movies:/movies
    ports:
      - "32400:32400"
    restart: unless-stopped
